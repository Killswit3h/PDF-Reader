name: Build & Release

# Trigger by pushing a version tag (e.g. v1.0.0) or clicking "Run workflow"
# in the Actions tab (uses the version from package.json).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # needed to create the Release and upload artifacts

jobs:
  # ---------------- Tests (gate the build) ----------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Full install (NOT --omit=optional): vitest's rolldown binding is an
      # optional platform dep. A failing optional canvas build is tolerated.
      - run: npm ci
      - name: Install headless display + Electron libs
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libgtk-3-0 libgbm1 libasound2t64 || \
          sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libgtk-3-0 libgbm1 libasound2
      - name: Unit tests
        run: npm test
      - name: E2E smoke tests (headless via xvfb)
        run: xvfb-run --auto-servernum npm run test:e2e

  # ---------------- Windows ----------------
  build-windows:
    needs: [test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        # Skip optional deps: pdfjs-dist pulls in native "canvas" (Node-only,
        # which we never use). Building it on the runner needs a C toolchain.
        run: npm ci --omit=optional
      - name: Build Windows installer (NSIS, x64)
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          # latest.yml + the .blockmap are electron-updater's update feed —
          # ship them alongside the installer so the app can self-update. Kept
          # best-effort (warn): if a build ever omits the metadata, the release
          # still ships and the app falls back to the manual download flow.
          path: |
            release/PDF-Signer-Setup.exe
            release/latest.yml
            release/*.blockmap
          if-no-files-found: warn

  # ---------------- macOS ----------------
  build-mac:
    needs: [test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        # `dmg-license` is an optional, macOS-only dependency electron-builder
        # needs to build the .dmg. `--omit=optional` (used to skip pdfjs-dist's
        # native `canvas`) drops it too, which broke the mac build with
        # "Cannot find module 'dmg-license'"; install it explicitly here.
        run: |
          npm ci --omit=optional
          npm install --no-save dmg-license
      - name: Build macOS app (dmg + zip, universal, unsigned)
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing / notarization are skipped unless these secrets exist:
          #   CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Universal builds hard-link the icon into each per-arch temp app; on a
          # clean runner the target already exists and the link fails with
          # "EEXIST ... icon.icns". Force copy-with-overwrite instead of linking.
          USE_HARD_LINKS: false
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            release/*.dmg
            release/*.zip

  # ---------------- Android ----------------
  build-android:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Capacitor CLI requires Node >= 22.
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - run: npm ci
      - name: Build web bundle + generate Android project
        # inject-signing wires an explicit debug signingConfig -> build/debug.keystore
        # so every released APK is signed with ONE stable key and installs as an
        # in-place update over the previous version (no uninstall).
        run: |
          npm run build:web
          npx cap add android
          npx cap sync android
          node build/make-android-icons.js android/app/src/main/res
          node build/inject-signing.js
      - name: Assemble debug APK
        # Debug build signed with the committed, stable debug keystore, so it
        # installs via sideload without a release keystore (same "unsigned"
        # posture as the desktop installers) but with a consistent signature.
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug
      - name: Verify APK is signed with the committed keystore
        run: |
          EXPECT=$(keytool -exportcert -keystore build/debug.keystore -storepass android -alias androiddebugkey 2>/dev/null | sha256sum | cut -d' ' -f1)
          GOT=$(node build/apk-cert-sha256.js android/app/build/outputs/apk/debug/app-debug.apk)
          echo "expected=$EXPECT"; echo "got=     $GOT"
          test "$EXPECT" = "$GOT"
      - name: Stage APK with a stable name
        run: |
          mkdir -p release-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk release-apk/PDF-Signer.apk
      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: release-apk/PDF-Signer.apk

  # ---------------- Publish combined release ----------------
  release:
    needs: [build-windows, build-mac, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
      - name: Determine release tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            VER=$(node -p "require('./package.json').version")
            echo "tag=v${VER}" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: PDF Signer ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            dist-artifacts/windows/PDF-Signer-Setup.exe
            dist-artifacts/windows/latest.yml
            dist-artifacts/windows/*.blockmap
            dist-artifacts/mac/*.dmg
            dist-artifacts/mac/*.zip
            dist-artifacts/android/PDF-Signer.apk
