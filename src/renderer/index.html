<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Offline app: restrict to local resources only. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:; worker-src 'self' blob:; connect-src 'self' blob: data:;" />
  <title>PDF Signer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ================= Toolbar ================= -->
  <header id="toolbar">
    <div class="tb-group">
      <button id="btn-open" class="tb-btn primary" title="Open a PDF (Ctrl+O)">📂 Open</button>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group">
      <button id="btn-sign" class="tb-btn" disabled title="Place a signature">✒️ Sign</button>
      <button id="btn-initials" class="tb-btn" disabled title="Place initials">🅰️ Initials</button>
      <button id="btn-date" class="tb-btn" disabled title="Place today's date">📅 Date</button>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group">
      <button id="btn-zoom-out" class="tb-btn icon" disabled title="Zoom out">−</button>
      <span id="zoom-label" class="tb-readout">100%</span>
      <button id="btn-zoom-in" class="tb-btn icon" disabled title="Zoom in">+</button>
      <button id="btn-fit-width" class="tb-btn" disabled title="Fit to width">↔ Fit</button>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group">
      <button id="btn-prev" class="tb-btn icon" disabled title="Previous page">▲</button>
      <span class="tb-readout">
        <input id="page-input" type="number" min="1" value="1" disabled />
        / <span id="page-total">0</span>
      </span>
      <button id="btn-next" class="tb-btn icon" disabled title="Next page">▼</button>
    </div>

    <div class="tb-spacer"></div>

    <div class="tb-group">
      <button id="btn-save" class="tb-btn primary" disabled title="Save signed PDF (Ctrl+S)">💾 Save</button>
    </div>
  </header>

  <!-- ============ Status / mode banner ============ -->
  <div id="mode-banner" class="hidden">
    <span id="mode-banner-text"></span>
    <button id="mode-cancel" class="link-btn">Cancel</button>
  </div>

  <!-- ================= Viewer ================= -->
  <main id="viewer-wrap">
    <!-- Empty state / drop target -->
    <div id="empty-state">
      <div class="empty-inner">
        <div class="empty-icon">📄</div>
        <h1>PDF Signer</h1>
        <p>Open a PDF to view and sign it.</p>
        <button id="btn-open-empty" class="tb-btn primary large">📂 Open PDF</button>
        <p class="hint">…or drag a <b>.pdf</b> file anywhere onto this window.</p>
      </div>
    </div>

    <!-- Pages are injected here -->
    <div id="pages-container"></div>
  </main>

  <!-- Full-window drag-over overlay -->
  <div id="drop-overlay" class="hidden"><div class="drop-msg">Drop PDF to open</div></div>

  <!-- Loading spinner -->
  <div id="loading" class="hidden"><div class="spinner"></div><span id="loading-text">Loading…</span></div>

  <!-- Toast messages -->
  <div id="toast" class="hidden"></div>

  <!-- ============ Signature creation modal ============ -->
  <div id="sig-modal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-head">
        <h2 id="sig-modal-title">Add Signature</h2>
        <button id="sig-close" class="modal-x" title="Close">✕</button>
      </div>

      <div class="modal-tabs">
        <button class="sig-tab active" data-tab="type">Type</button>
        <button class="sig-tab" data-tab="draw">Draw</button>
      </div>

      <!-- Type panel -->
      <div class="sig-panel" data-panel="type">
        <label class="field-label" id="type-input-label">Your name</label>
        <input id="sig-type-input" type="text" maxlength="40" placeholder="Type your name" />
        <div class="font-choices" id="font-choices"></div>
        <div class="sig-preview-label">Preview</div>
        <div id="sig-type-preview" class="sig-preview"></div>
      </div>

      <!-- Draw panel -->
      <div class="sig-panel hidden" data-panel="draw">
        <div class="draw-wrap">
          <canvas id="sig-draw-canvas" width="700" height="240"></canvas>
          <div class="draw-baseline"></div>
        </div>
        <div class="draw-tools">
          <label>Ink
            <input id="sig-ink-color" type="color" value="#08306b" />
          </label>
          <button id="sig-clear" class="tb-btn">Clear</button>
        </div>
      </div>

      <div class="modal-foot">
        <button id="sig-cancel" class="tb-btn">Cancel</button>
        <button id="sig-done" class="tb-btn primary">Use signature</button>
      </div>
    </div>
  </div>

  <!-- ======= Vendored, offline libraries (UMD builds) ======= -->
  <script src="../../node_modules/pdfjs-dist/legacy/build/pdf.js"></script>
  <script src="../../node_modules/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="../../node_modules/signature_pad/dist/signature_pad.umd.min.js"></script>

  <!-- ======= App modules ======= -->
  <script src="js/util.js"></script>
  <script src="js/signature.js"></script>
  <script src="js/placement.js"></script>
  <script src="js/viewer.js"></script>
  <script src="js/save.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
